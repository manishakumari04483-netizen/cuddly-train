<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="100%" height="100%" fill="#f7fbff"/>
  <!-- Train body -->
  <g transform="translate(80,120)">
    <rect x="0" y="40" width="520" height="160" rx="20" fill="#ff8c69" stroke="#d95b3b" stroke-width="4"/>
    <rect x="380" y="0" width="150" height="120" rx="16" fill="#ffd27f" stroke="#e7a84a" stroke-width="4"/>
    <!-- windows -->
    <rect x="40" y="60" width="80" height="60" rx="8" fill="#ffffffaa" stroke="#ffffff" stroke-width="2"/>
    <rect x="140" y="60" width="80" height="60" rx="8" fill="#ffffffaa" stroke="#ffffff" stroke-width="2"/>
    <rect x="240" y="60" width="80" height="60" rx="8" fill="#ffffffaa" stroke="#ffffff" stroke-width="2"/>
    <!-- smiley face on front car -->
    <g transform="translate(455,40)">
      <circle cx="50" cy="50" r="36" fill="#fff" stroke="#ffd27f" stroke-width="4"/>
      <circle cx="40" cy="45" r="4" fill="#333"/>
      <circle cx="60" cy="45" r="4" fill="#333"/>
      <path d="M38 58 Q50 70 62 58" stroke="#e07b3d" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
    <!-- chimney -->
    <rect x="440" y="-20" width="30" height="30" rx="6" fill="#8ecae6" stroke="#5aa6c6" stroke-width="3"/>
  </g>
  <!-- wheels -->
  <g transform="translate(80,120)">
    <g transform="translate(40,200)">
      <circle cx="0" cy="0" r="28" fill="#3b3b3b"/>
      <circle cx="0" cy="0" r="12" fill="#ffecb3"/>
    </g>
    <g transform="translate(200,200)">
      <circle cx="0" cy="0" r="28" fill="#3b3b3b"/>
      <circle cx="0" cy="0" r="12" fill="#ffecb3"/>
    </g>
    <g transform="translate(360,200)">
      <circle cx="0" cy="0" r="28" fill="#3b3b3b"/>
      <circle cx="0" cy="0" r="12" fill="#ffecb3"/>
    </g>
    <g transform="translate(520,200)">
      <circle cx="0" cy="0" r="28" fill="#3b3b3b"/>
      <circle cx="0" cy="0" r="12" fill="#ffecb3"/>
    </g>
  </g>
  <!-- tracks -->
  <line x1="0" y1="340" x2="800" y2="340" stroke="#6c6c6c" stroke-width="6" stroke-linecap="round"/>
  <g stroke="#6c6c6c" stroke-width="4">
    <line x1="20" y1="320" x2="40" y2="360"/>
    <line x1="80" y1="320" x2="100" y2="360"/>
    <line x1="140" y1="320" x2="160" y2="360"/>
    <line x1="200" y1="320" x2="220" y2="360"/>
    <line x1="260" y1="320" x2="280" y2="360"/>
    <line x1="320" y1="320" x2="340" y2="360"/>
    <line x1="380" y1="320" x2="400" y2="360"/>
    <line x1="440" y1="320" x2="460" y2="360"/>
    <line x1="500" y1="320" x2="520" y2="360"/>
    <line x1="560" y1="320" x2="580" y2="360"/>
    <line x1="620" y1="320" x2="640" y2="360"/>
    <line x1="680" y1="320" x2="700" y2="360"/>
  </g>
  <!-- text -->
  <text x="420" y="380" fill="#6c6c6c" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">Cuddly Train</text>
</svg>